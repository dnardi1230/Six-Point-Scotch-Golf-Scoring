<script>
const {useState,useEffect,useCallback,useMemo,useRef}=React;
const h=React.createElement;

// ─── CONSTANTS ──────────────────────────────────────────────────────
const BUILT_IN_COURSES=[
  {
    id:'stonebridge',name:'Stonebridge CC',city:'Aurora, IL',
    par:[5,4,3,4,4,4,4,3,5,4,4,3,4,5,4,4,3,5],
    hcp:[5,15,13,7,11,3,1,17,9,18,2,14,10,6,8,12,16,4],
    tees:[
      {name:'Black',slope:147,rating:75.6},
      {name:'Blue',slope:139,rating:72.3,default:true},
      {name:'Gold',slope:143,rating:74.1},
      {name:'Red',slope:133,rating:72.4},
      {name:'White',slope:133,rating:71.2},
    ],
    builtIn:true
  },
  {
    id:'soleta',name:'Soleta Golf Club',city:'Myakka City, FL',
    par:[4,4,3,4,5,4,3,5,4,4,4,3,4,4,5,3,4,5],
    hcp:[9,1,11,5,7,13,17,15,3,4,6,18,10,2,12,8,16,14],
    tees:[
      {name:'Black',slope:143,rating:74.6},
      {name:'Black/Gold',slope:139,rating:73.4},
      {name:'Blue',slope:130,rating:70.0,default:true},
      {name:'Blue/White',slope:128,rating:68.9},
      {name:'Gold',slope:136,rating:71.9},
      {name:'Gold/Blue',slope:134,rating:70.9},
      {name:'White',slope:120,rating:67.7},
    ],
    builtIn:true
  }
];

const TEAM_COLORS=['team-a','team-b'];
// ─── GAME FORMATS ───────────────────────────────────────────────
// Team arrays are Team A player indices per segment; Team B is the rest.
const FORMATS={
  six:{
    label:'6-6-6 — partners rotate every 6 holes',
    segs:3,holesPerSeg:6,
    teams:[[0,1],[0,2],[0,3]],
    names:['The Opener','The Neat','The Nightcap'],
    shortNames:['OPENER','NEAT','NIGHTCAP'],
    desc:'Partners rotate every 6 holes — everyone plays with everyone:',
  },
  nine:{
    label:'9 & 9 — partners switch at the turn',
    segs:2,holesPerSeg:9,
    teams:[[0,1],[0,2]],
    names:['The Front','The Back'],
    shortNames:['FRONT','BACK'],
    desc:'Partners switch at the turn — two 9-hole matches:',
  },
  eighteen:{
    label:'18-hole match — same partners all round',
    segs:1,holesPerSeg:18,
    teams:[[0,1]],
    names:['The Match'],
    shortNames:['MATCH'],
    desc:'Fixed partners for the full 18-hole match:',
  },
};
// Module-level current format. App syncs this from state at the top of
// every render, so all hoisted helpers below see the right config.
let CURRENT_FORMAT='six';
function getFmt(){return FORMATS[CURRENT_FORMAT]||FORMATS.six;}
function getSegCount(){return getFmt().segs;}
function getHolesPerSeg(){return getFmt().holesPerSeg;}
function getSegNames(){return getFmt().names;}
function getSegShortNames(){return getFmt().shortNames;}
function segOfHoleIdx(holeIdx){return Math.min(Math.floor(holeIdx/getHolesPerSeg()),getSegCount()-1);}

// Player color per index — used for both the leaderboard and the
// segment-card border colors. Kept as a single shared list so the
// rgba-conversion helper can handle every entry uniformly.
const PLAYER_COLORS=['#d4a843','#4ade80','#f87171','#a78bfa'];

// Convert any color string ('#rrggbb', 'var(--gold)', or 'rgb(...)') into
// an `rgba(r,g,b,alpha)` string. Returns null if it can't parse.
function colorToRgba(col,alpha){
  if(!col)return null;
  // CSS variable → look up known mapping
  if(col.startsWith('var(')){
    const name=col.slice(4,-1).replace('--','').trim();
    const map={gold:'212,168,67',green:'74,222,128',red:'248,113,113'};
    const v=map[name];
    if(!v)return null;
    return `rgba(${v},${alpha})`;
  }
  // hex
  if(col.startsWith('#')){
    let s=col.slice(1);
    if(s.length===3)s=s.split('').map(c=>c+c).join('');
    if(s.length!==6)return null;
    const r=parseInt(s.slice(0,2),16);
    const g=parseInt(s.slice(2,4),16);
    const b=parseInt(s.slice(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  return null;
}

// ─── STORAGE ──────────────────────────────────────────────────────
const SK='sps_v3';
const ROSTER_KEY='sps_roster_v1';
function loadRoster(){try{return JSON.parse(localStorage.getItem(ROSTER_KEY))||[];}catch{return[];}}
function saveRoster(r){try{localStorage.setItem(ROSTER_KEY,JSON.stringify(r));}catch{}}
const HISTORY_KEY='sps_history_v1';
function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch{return[];}}
function saveHistory(hst){try{localStorage.setItem(HISTORY_KEY,JSON.stringify(hst));}catch{}}

// Blank-round helpers shared by reset / new round / undo
function blankHoles(){return Array.from({length:18},()=>({scores:[null,null,null,null],prox:null,press:false,roll:false,reroll:false}));}
function defaultPlayers(){return[{name:'Player 1',hi:''},{name:'Player 2',hi:''},{name:'Player 3',hi:''},{name:'Player 4',hi:''}];}

// Per-player net (team pts − opponent pts, per hole) across all 18 holes.
// Function declarations are hoisted so getTeamForSeg is available.
function calcPlayerNets(state,holeResults){
  return state.players.map((_,pi)=>{
    let sum=0;
    for(let i=0;i<18;i++){
      if(state.holes[i].scores[pi]==null)continue;
      const r=holeResults[i];
      const{a:teamA}=getTeamForSeg(segOfHoleIdx(i));
      sum+=teamA.includes(pi)?(r.pts.a-r.pts.b):(r.pts.b-r.pts.a);
    }
    return sum;
  });
}
// Per-player gross points across all 18 holes
function calcPlayerPtsArr(state,holeResults){
  return state.players.map((_,pi)=>{
    let sum=0;
    for(let i=0;i<18;i++){
      if(state.holes[i].scores[pi]==null)continue;
      const r=holeResults[i];
      const{a:teamA}=getTeamForSeg(segOfHoleIdx(i));
      sum+=teamA.includes(pi)?r.pts.a:r.pts.b;
    }
    return sum;
  });
}
// Minimum-transaction settlement (greedy creditor/debtor matching)
function calcSettlement(nets,dollarsPerPt){
  const creditors=[],debtors=[];
  nets.forEach((n,pi)=>{
    if(n>0)creditors.push({pi,amt:n});
    else if(n<0)debtors.push({pi,amt:-n});
  });
  creditors.sort((a,b)=>b.amt-a.amt);
  debtors.sort((a,b)=>b.amt-a.amt);
  const txs=[];
  let ci=0,di=0;
  while(ci<creditors.length&&di<debtors.length){
    const cr=creditors[ci],d=debtors[di];
    const pay=Math.min(cr.amt,d.amt);
    if(pay>0)txs.push({from:d.pi,to:cr.pi,points:pay,dollars:pay*dollarsPerPt});
    cr.amt-=pay; d.amt-=pay;
    if(cr.amt===0)ci++;
    if(d.amt===0)di++;
  }
  return txs;
}
function loadState(){
  try{
    const s=localStorage.getItem(SK);
    if(!s)return null;
    const parsed=JSON.parse(s);
    // Migrate old prox format: 'a'/'b' strings → null (player index not known)
    if(parsed.holes){
      parsed.holes=parsed.holes.map(h=>({
        ...h,
        prox:(h.prox==='a'||h.prox==='b')?null:h.prox
      }));
    }
    return parsed;
  }catch{return null}
}
function saveState(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch{}}

// ─── HANDICAP CALC ────────────────────────────────────────────────
function courseHCP(hi,slope,rating,par){
  if(hi==null||isNaN(hi))return 0;
  return Math.round(hi*(slope/113)+(rating-par));
}
// strokes received per hole: returns array[18] of 0/1/2
function strokesPerHole(chcp,hcpRanks){
  const full=Math.abs(chcp);
  const neg=chcp<0;
  return hcpRanks.map(rank=>{
    let s=rank<=full?1:0;
    if(full>18&&rank<=(full-18))s=2;
    return neg?-s:s;
  });
}

// ─── SCORING LOGIC ────────────────────────────────────────────────
function getSegment(hole){return segOfHoleIdx(hole-1);}
function getTeamForSeg(seg,players){
  // returns [playerIndices] for each team in this segment
  const f=getFmt();
  const a=f.teams[Math.min(seg,f.segs-1)];
  const b=[0,1,2,3].filter(i=>!a.includes(i));
  return{a,b};
}

function calcHolePoints(holeData,holeIdx,course,teeIdx,players,chcps){
  if(!holeData||!course)return{prox:null,low:null,total:null,birdie:null,umbrella:false,multiplier:1,pts:{a:0,b:0}};
  const seg=getSegment(holeIdx+1);
  const{a:teamA,b:teamB}=getTeamForSeg(seg);
  const par=course.par[holeIdx];
  const hcpRank=course.hcp[holeIdx];
  const tee=course.tees[teeIdx];
  const strokes=players.map((_,pi)=>strokesPerHole(chcps[pi],course.hcp)[holeIdx]);

  // gross scores
  const gross=players.map((_,pi)=>holeData.scores[pi]);
  const net=players.map((p,pi)=>gross[pi]!=null?gross[pi]-strokes[pi]:null);

  // PROX: manual, 1pt
  // prox stored as player index string '0'-'3', or null
  // Guard against old 'a'/'b' format saved in localStorage
  const proxRaw=holeData.prox;
  const proxParsed=proxRaw!=null&&proxRaw!==''?parseInt(proxRaw):NaN;
  const proxPlayerIdx=(!isNaN(proxParsed)&&proxParsed>=0&&proxParsed<=3)?proxParsed:null;
  const prox=proxPlayerIdx!=null?(teamA.includes(proxPlayerIdx)?'a':'b'):null;

  // BIRDIE: natural birdie OR BETTER (gross <= par-1: birdie, eagle,
  // albatross, hole-in-one all qualify), per team. 1pt if any player on
  // team makes it and the opponent doesn't; both teams = tie = 0 pts.
  const birdie_a=teamA.some(pi=>gross[pi]!=null&&gross[pi]<=par-1);
  const birdie_b=teamB.some(pi=>gross[pi]!=null&&gross[pi]<=par-1);
  let birdie=null;
  if(birdie_a&&!birdie_b)birdie='a';
  else if(birdie_b&&!birdie_a)birdie='b';
  // tie = 0 pts

  // LOW NET: best individual net score per team. 2pt
  const net_a=teamA.map(pi=>net[pi]).filter(v=>v!=null);
  const net_b=teamB.map(pi=>net[pi]).filter(v=>v!=null);
  const bestA=net_a.length?Math.min(...net_a):null;
  const bestB=net_b.length?Math.min(...net_b):null;
  let low=null;
  if(bestA!=null&&bestB!=null){
    if(bestA<bestB)low='a';
    else if(bestB<bestA)low='b';
  }

  // TOTAL (team net): sum of nets per team. 2pt
  const sum_a=teamA.reduce((s,pi)=>net[pi]!=null?s+net[pi]:s,0);
  const sum_b=teamB.reduce((s,pi)=>net[pi]!=null?s+net[pi]:s,0);
  const allA=teamA.every(pi=>net[pi]!=null);
  const allB=teamB.every(pi=>net[pi]!=null);
  let total=null;
  if(allA&&allB){
    if(sum_a<sum_b)total='a';
    else if(sum_b<sum_a)total='b';
  }

  // Points per category
  const cats={prox,low,total,birdie};
  let pts_a=0,pts_b=0;
  if(prox==='a')pts_a+=1; else if(prox==='b')pts_b+=1;
  if(low==='a')pts_a+=2; else if(low==='b')pts_b+=2;
  if(total==='a')pts_a+=2; else if(total==='b')pts_b+=2;
  if(birdie==='a')pts_a+=1; else if(birdie==='b')pts_b+=1;

  // UMBRELLA: one team wins ALL 6 points on the hole AND a player on that
  // team carded a natural birdie or better (eagle, albatross, hole-in-one
  // all qualify) → the 6 points double to 12.
  // Note: winning all 6 requires winning the BIRDIE category, so the
  // birdie-or-better condition is checked explicitly here to enforce the
  // rule directly and keep it robust to future point-structure changes.
  let umbrella=false;
  const base_a=pts_a,base_b=pts_b;
  if(pts_a===6&&birdie_a){umbrella=true;pts_a=12;}
  if(pts_b===6&&birdie_b){umbrella=true;pts_b=12;}

  // Multiplier
  let mult=1;
  if(holeData.press)mult*=2;
  if(holeData.roll)mult*=2;
  if(holeData.reroll)mult*=2;

  return{
    prox,proxPlayerIdx,low,total,birdie,umbrella,multiplier:mult,
    pts:{a:pts_a*mult,b:pts_b*mult},
    base:{a:base_a,b:base_b},
    strokes,net,gross
  };
}

// ─── DEFAULT STATE ──────────────────────────────────────────────
function defaultState(){
  return{
    tab:'scoring',
    courseId:'stonebridge',
    teeIdx:1,
    format:'six',
    players:[
      {name:'Player 1',hi:''},
      {name:'Player 2',hi:''},
      {name:'Player 3',hi:''},
      {name:'Player 4',hi:''},
    ],
    holes:Array.from({length:18},()=>({
      scores:[null,null,null,null],
      prox:null,press:false,roll:false,reroll:false
    })),
    currentHole:0,
    customCourses:[],
    dollarPerPt:1,
  };
}

// ─── MAIN APP ─────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(()=>{
    const saved=loadState();
    return saved||defaultState();
  });

  // Sync the module-level format before any memos/children compute,
  // so all hoisted segment helpers use the right config this render.
  CURRENT_FORMAT=state.format||'six';

  useEffect(()=>{saveState(state)},[state]);

  const courses=useMemo(()=>[...BUILT_IN_COURSES,...(state.customCourses||[])]
    .sort((a,b)=>a.name.localeCompare(b.name)),[state.customCourses]);

  const course=useMemo(()=>courses.find(c=>c.id===state.courseId)||courses[0],[courses,state.courseId]);
  const tee=course?.tees[state.teeIdx]||course?.tees[0];
  const coursePar=course?course.par.reduce((s,p)=>s+p,0):72;

  const chcps=useMemo(()=>state.players.map(p=>{
    const hi=parseFloat(p.hi);
    if(!course||!tee||isNaN(hi))return 0;
    return courseHCP(hi,tee.slope,tee.rating,coursePar);
  }),[state.players,course,tee,coursePar]);

  // Calc all holes
  const holeResults=useMemo(()=>state.holes.map((h,i)=>
    calcHolePoints(h,i,course,state.teeIdx,state.players,chcps)
  ),[state.holes,course,state.teeIdx,state.players,chcps,state.format]);

  // Total points by segment
  const segTotals=useMemo(()=>Array.from({length:getSegCount()},(_,seg)=>{
    const hps=getHolesPerSeg();
    const hStart=seg*hps,hEnd=Math.min(hStart+hps,18);
    let a=0,b=0;
    for(let i=hStart;i<hEnd;i++){a+=holeResults[i].pts.a;b+=holeResults[i].pts.b;}
    return{a,b};
  }),[holeResults,state.format]);

  // Grand total
  const grandTotal=useMemo(()=>({
    a:segTotals.reduce((s,t)=>s+t.a,0),
    b:segTotals.reduce((s,t)=>s+t.b,0)
  }),[segTotals]);

  const setTab=t=>setState(s=>({...s,tab:t}));
  const setHole=i=>setState(s=>({...s,currentHole:i}));

  // ── Round history + undo ──────────────────────────────────────
  const [history,setHistory]=useState(()=>loadHistory());
  useEffect(()=>saveHistory(history),[history]);
  const [undoSnap,setUndoSnap]=useState(null);

  // Auto-dismiss the undo option after 30 seconds
  useEffect(()=>{
    if(!undoSnap)return;
    const t=setTimeout(()=>setUndoSnap(null),30000);
    return()=>clearTimeout(t);
  },[undoSnap]);

  const anyScores=state.holes.some(hh=>hh.scores.some(s=>s!=null));

  // Build an archival record of the current round for history
  function buildRoundRecord(){
    const nets=calcPlayerNets(state,holeResults);
    const ptsArr=calcPlayerPtsArr(state,holeResults);
    const txs=calcSettlement(nets,state.dollarPerPt||1);
    const grossArr=state.players.map((_,pi)=>state.holes.reduce((s,hh)=>s+(hh.scores[pi]||0),0));
    const holesPlayed=state.holes.filter(hh=>hh.scores.every(s=>s!=null)).length;
    const umbrellas=holeResults.filter(r=>r.umbrella).length;
    return{
      date:new Date().toISOString(),
      courseName:course?.name||'Unknown course',
      teeName:tee?.name||'',
      dollarPerPt:state.dollarPerPt||1,
      holesPlayed,umbrellas,
      players:state.players.map((p,i)=>({name:p.name,hi:p.hi,chcp:chcps[i],net:nets[i],pts:ptsArr[i],gross:grossArr[i]})),
      settlement:txs.map(t=>({from:state.players[t.from].name,to:state.players[t.to].name,points:t.points,dollars:t.dollars})),
    };
  }

  // Clear the round. Archives to history first (if any scores were entered)
  // and keeps an undo snapshot for 30 seconds.
  function clearRound({clearPlayers}={}){
    const archived=anyScores;
    if(archived)setHistory(hst=>[buildRoundRecord(),...hst].slice(0,50));
    setUndoSnap({
      holes:state.holes,
      currentHole:state.currentHole,
      players:state.players,
      archived,
    });
    setState(s=>({
      ...s,
      holes:blankHoles(),
      currentHole:0,
      ...(clearPlayers?{players:defaultPlayers()}:{}),
    }));
  }

  function undoClear(){
    if(!undoSnap)return;
    setState(s=>({...s,holes:undoSnap.holes,currentHole:undoSnap.currentHole,players:undoSnap.players}));
    // Remove the auto-archived record so the round isn't duplicated in history
    if(undoSnap.archived)setHistory(hst=>hst.slice(1));
    setUndoSnap(null);
  }

  const updateHole=(idx,key,val)=>setState(s=>{
    const holes=[...s.holes];
    holes[idx]={...holes[idx],[key]:val};
    return{...s,holes};
  });
  const setScore=(holeIdx,playerIdx,val)=>setState(s=>{
    const holes=[...s.holes];
    const scores=[...holes[holeIdx].scores];
    scores[playerIdx]=val;
    holes[holeIdx]={...holes[holeIdx],scores};
    return{...s,holes};
  });

  // A hole is "complete" once every player has entered a gross score.
  // PROX is optional — some holes (e.g. par 5s where no one is on in regulation)
  // simply have no closest-to-pin awarded, and that shouldn't block the
  // hole from being marked complete or showing its points.
  const isHoleComplete=i=>{
    const h=state.holes[i];
    return h&&h.scores.every(s=>s!=null);
  };

  const tabs=[
    {id:'scoring',label:'Input Scoring'},
    {id:'leaderboard',label:'Leaderboard'},
    {id:'setup',label:'Setup Round'},
    {id:'courses',label:'Courses'},
  ];

  return h('div',{id:'root'},
    h('div',{className:'tab-bar'},
      tabs.map(t=>h('button',{key:t.id,className:`tab-btn${state.tab===t.id?' active':''}`,onClick:()=>setTab(t.id)},t.label))
    ),
    h('div',{className:'tab-content'},
      state.tab==='scoring'&&h(ScoringTab,{state,setState,course,tee,chcps,holeResults,segTotals,isHoleComplete,setHole,updateHole,setScore,clearRound}),
      state.tab==='leaderboard'&&h(LeaderboardTab,{state,setState,course,tee,chcps,holeResults,segTotals,grandTotal,history,setHistory}),
      state.tab==='setup'&&h(SetupTab,{state,setState,courses,course,tee,chcps,coursePar,clearRound}),
      state.tab==='courses'&&h(CoursesTab,{state,setState,courses}),
    ),
    // ── Undo banner (shows for 30s after a round is cleared) ──────
    undoSnap&&h('div',{style:{
      position:'fixed',bottom:16,left:'50%',transform:'translateX(-50%)',
      background:'var(--surface3)',border:'1px solid var(--gold)',borderRadius:10,
      padding:'10px 16px',display:'flex',alignItems:'center',gap:12,zIndex:300,
      boxShadow:'0 4px 24px rgba(0,0,0,0.5)',maxWidth:'92vw'
    }},
      h('span',{style:{fontSize:13,color:'var(--text1)',whiteSpace:'nowrap'}},
        undoSnap.archived?'Round saved to history':'Round cleared'),
      h('button',{
        className:'btn btn-primary btn-sm',
        onClick:undoClear
      },'Undo'),
      h('button',{
        className:'btn btn-ghost btn-sm',
        onClick:()=>setUndoSnap(null)
      },'✕')
    )
  );
}

// ─── SCORING TAB ─────────────────────────────────────────────────
function ScoringTab({state,setState,course,tee,chcps,holeResults,segTotals,isHoleComplete,setHole,updateHole,setScore,clearRound}){
  const [confirmReset,setConfirmReset]=useState(false);
  const hi=state.currentHole;
  const result=holeResults[hi];
  const holeData=state.holes[hi];
  const par=course?course.par[hi]:4;
  const seg=getSegment(hi+1);
  const{a:teamA,b:teamB}=getTeamForSeg(seg);
  const strokes=result.strokes||[0,0,0,0];

  const segLabel=getSegNames()[seg];
  const teamANames=teamA.map(i=>state.players[i].name).join(' & ');
  const teamBNames=teamB.map(i=>state.players[i].name).join(' & ');

  const proxOptions=[
    {val:null,label:'— None —'},
    ...teamA.filter(pi=>state.players[pi]).map(pi=>({val:String(pi),label:state.players[pi].name||'Player '+(pi+1)})),
    ...teamB.filter(pi=>state.players[pi]).map(pi=>({val:String(pi),label:state.players[pi].name||'Player '+(pi+1)})),
  ];

  // Order the score boxes so partners sit side-by-side:
  // top row = Team A, bottom row = Team B
  const scoreBoxOrder=[teamA[0],teamA[1],teamB[0],teamB[1]];

  // Score stepper helper:
  // - First tap on +/- when no score is entered yet → start at par
  // - Subsequent taps adjust from current value
  const stepScore=(holeIdx,playerIdx,delta,gross,parVal)=>{
    if(gross==null)return setScore(holeIdx,playerIdx,parVal);
    return setScore(holeIdx,playerIdx,Math.max(1,gross+delta));
  };

  // Segment recap holes
  const hps=getHolesPerSeg();
  const segStart=seg*hps, segEnd=Math.min(segStart+hps,18);
  const segHoles=Array.from({length:segEnd-segStart},(_,i)=>segStart+i);

  return h('div',{className:'page'},
    // Hole grid with segment-color legend
    h('div',null,
      h('div',{className:'seg-legend'},
        getSegNames().map((lbl,si)=>
          h('span',{key:si,className:'seg-chip'},
            h('span',{className:'seg-chip-dot',style:{background:`var(--seg${si})`}}),
            lbl
          )
        )
      ),
      h('div',{className:'hole-grid'},
        Array.from({length:18},(_,i)=>{
          const s=getSegment(i+1);
          return h('div',{
            key:i,
            className:`hole-cell seg-${s}${i===hi?' current':''}${isHoleComplete(i)?' complete':''}`,
            onClick:()=>setHole(i)
          },
            h('div',{className:'hole-num'},i+1),
            h('div',{className:'hole-par'},'Par '+(course?.par[i]||4))
          );
        })
      ),
    ),

    // Current segment info
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px',marginTop:'4px'}},
      h('span',{style:{fontSize:12,color:`var(--seg${seg})`,fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:'0.08em'}},segLabel),
      h('span',{style:{fontSize:12,fontFamily:"'DM Mono',monospace",color:'var(--text2)'}},
        `${teamANames} vs ${teamBNames}`
      )
    ),

    // Hole nav
    h('div',{className:'hole-nav'},
      h('button',{className:'btn btn-ghost btn-icon',onClick:()=>hi>0&&setHole(hi-1),disabled:hi===0},'◀'),
      h('div',{className:'hole-nav-title'},`HOLE ${hi+1}  ·  PAR ${par}`),
      h('button',{className:'btn btn-ghost btn-icon',onClick:()=>hi<17&&setHole(hi+1),disabled:hi===17},'▶'),
    ),

    // Score entry — partners sit side-by-side (Team A on top, Team B below)
    h('div',{className:'score-grid',style:{marginBottom:10}},
      scoreBoxOrder.map(pi=>{
        const isA=teamA.includes(pi);
        const gross=holeData.scores[pi];
        const net=gross!=null?gross-strokes[pi]:null;
        return h('div',{key:pi,className:`player-score-box ${isA?'team-a':'team-b'}`},
          h('div',{className:'player-name-row'},
            h('span',{style:{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:90}},
              state.players[pi].name
            ),
            h('span',{className:`badge ${isA?'badge-blue':'badge-gold'}`,style:{fontSize:10,flexShrink:0}},isA?'A':'B')
          ),
          h('div',{className:'player-strokes',style:{display:'flex',alignItems:'center',gap:6}},
            h('span',null,`HCP ${chcps[pi]}`),
            strokes[pi]>0
              ?h('span',{title:`${strokes[pi]} stroke${strokes[pi]!==1?'s':''} on this hole`,
                  style:{color:'var(--gold)',letterSpacing:'2px',fontSize:9}},
                  '●'.repeat(strokes[pi]))
              :strokes[pi]<0
                ?h('span',{style:{color:'var(--blue)',fontSize:10}},`gives ${-strokes[pi]}`)
                :null
          ),
          h('div',{className:'score-stepper'},
            h('button',{className:'step-btn',onClick:()=>stepScore(hi,pi,-1,gross,par)},'−'),
            h('div',{className:`step-val${gross==null?' placeholder':''}`},gross??par),
            h('button',{className:'step-btn',onClick:()=>stepScore(hi,pi,+1,gross,par)},'+'),
          ),
          net!=null&&h('div',{className:'net-badge'},`Net ${net}`)
        );
      })
    ),

    // Points display
    h('div',{className:'pts-row'},
      [
        {key:'prox',label:'PROX',special:'prox'},
        {key:'low',label:'LOW',val:result.low,pts:2},
        {key:'total',label:'TOTAL',val:result.total,pts:2},
        {key:'birdie',label:'BIRDIE',val:result.birdie,pts:1},
        {key:'mult',label:'MULT',special:'mult'},
        {key:'umbrella',label:'☂',special:'umbrella'},
      ].map(item=>{
        let display='—', cls='na', valSize=20;
        if(item.special==='prox'){
          const proxPi=result.proxPlayerIdx;
          if(proxPi!=null&&state.players[proxPi]){
            display=state.players[proxPi].name.split(' ')[0];
            cls='awarded';
            valSize=12;
          }
        } else if(item.special==='mult'){
          display=`×${result.multiplier}`;
          cls=result.multiplier>1?'awarded':'na';
          valSize=18;
        } else if(item.special==='umbrella'){
          display=result.umbrella?'YES':'NO';
          cls=result.umbrella?'umbrella':'na';
          valSize=16;
        } else if(item.val==='a'){
          display=`A+${item.pts}`;cls='awarded';
        } else if(item.val==='b'){
          display=`B+${item.pts}`;cls='awarded';
        }
        return h('div',{key:item.key,className:'pt-box'},
          h('span',{className:'pt-label'},item.label),
          h('div',{className:`pt-val ${cls}`,style:{fontSize:valSize}},display)
        );
      })
    ),

    // Half-entered hole warning
    (()=>{
      const entered=holeData.scores.filter(s=>s!=null).length;
      if(entered>0&&entered<4){
        return h('div',{style:{
          background:'var(--amber-dim)',border:'1px solid rgba(245,158,11,0.3)',
          borderRadius:6,padding:'7px 12px',marginBottom:10,
          fontSize:12,color:'var(--amber)',display:'flex',alignItems:'center',gap:8
        }},
          h('span',{style:{fontSize:13}},'⚠'),
          h('span',null,`${entered} of 4 scores entered — points are provisional until all scores are in`)
        );
      }
      return null;
    })(),

    // Running score
    h('div',{style:{display:'flex',gap:8,marginBottom:10}},
      ['a','b'].map(t=>{
        const tm=t==='a'?teamA:teamB;
        const names=tm.map(i=>state.players[i].name).join(' & ');
        const holePts=t==='a'?result.pts.a:result.pts.b;
        const segPts=t==='a'?segTotals[seg].a:segTotals[seg].b;
        return h('div',{key:t,style:{flex:1,background:'var(--surface2)',border:`1px solid ${t==='a'?'rgba(59,130,246,0.3)':'rgba(245,158,11,0.3)'}`,borderRadius:8,padding:'10px 12px'}},
          h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:4,fontFamily:"'DM Mono',monospace",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},names),
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
            h('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:t==='a'?'var(--blue)':'var(--amber)'}},segPts),
            h('span',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace"}},`+${holePts} this hole`)
          )
        );
      })
    ),

    // PROX
    h('div',{style:{marginBottom:10}},
      h('label',{className:'label'},'PROX (closest to pin · 1pt)'),
      h('select',{
        className:'input select',
        value:holeData.prox===null||holeData.prox===undefined?'':String(holeData.prox),
        onChange:e=>updateHole(hi,'prox',e.target.value===''?null:e.target.value)
      },
        proxOptions.map(o=>h('option',{key:String(o.val),value:o.val===null?'':o.val},o.label))
      )
    ),

    // Multipliers
    h('div',{style:{marginBottom:12}},
      h('label',{className:'label'},'Betting Multipliers (stack ×)'),
      h('div',{className:'mult-row'},
        [
          {key:'press',label:'PRESS',mult:'×2'},
          {key:'roll',label:'ROLL',mult:'×2'},
          {key:'reroll',label:'RE-ROLL',mult:'×2'},
        ].map(m=>
          h('label',{key:m.key,className:`mult-chip${holeData[m.key]?' active':''}`},
            h('input',{type:'checkbox',checked:holeData[m.key],onChange:e=>updateHole(hi,m.key,e.target.checked)}),
            m.label,
            h('span',{className:'mult-x'},m.mult)
          )
        )
      )
    ),

    // Segment recap
    h('details',{style:{marginBottom:8}},
      h('summary',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',marginBottom:4}},
        h('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:'0.05em',color:'var(--text2)'}},getSegNames()[seg].toUpperCase()+' RECAP'),
        h('span',{className:'chevron'},'▼')
      ),
      h('div',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}},
        segHoles.map(i=>{
          const r=holeResults[i];
          const complete=isHoleComplete(i);
          // When umbrella fires, the team's pts already include the ☂ value
          // (e.g. 12 with mult=1, or 24 with ×2). We show a small umbrella
          // marker rather than a separate "12" badge so it's not duplicative.
          return h('div',{key:i,className:'recap-row'},
            h('span',{className:'recap-hole'},`Hole ${i+1}  ·  Par ${course?.par[i]||'?'}`),
            h('span',{style:{display:'flex',gap:8,alignItems:'center'}},
              complete?h('span',{className:'recap-pts',style:{color:'var(--blue)'}},`A:${r.pts.a}`):null,
              complete?h('span',{className:'recap-pts',style:{color:'var(--amber)'}},`B:${r.pts.b}`):null,
              r.multiplier>1&&complete?h('span',{className:'badge badge-red'},`×${r.multiplier}`):null,
              r.umbrella&&complete?h('span',{title:'Umbrella',style:{fontSize:14}},'☂'):null,
              !complete&&h('span',{style:{fontSize:11,color:'var(--text3)'}},'—')
            )
          );
        })
      )
    ),

    // Reset button
    h('div',{style:{marginTop:4}},
      !confirmReset
        ?h('button',{
            className:'btn btn-danger btn-sm',
            onClick:()=>setConfirmReset(true)
          },'Reset Round')
        :h('div',{style:{display:'flex',alignItems:'center',gap:8,background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'10px 14px'}},
            h('span',{style:{fontSize:13,color:'var(--red)',flex:1}},'Erase all scores?'),
            h('button',{
              className:'btn btn-sm',
              style:{background:'var(--red)',color:'#fff',border:'none'},
              onClick:()=>{
                clearRound({clearPlayers:false});
                setConfirmReset(false);
              }
            },'Yes, Reset'),
            h('button',{
              className:'btn btn-ghost btn-sm',
              onClick:()=>setConfirmReset(false)
            },'Cancel')
          )
    )
  );
}

// ─── LEADERBOARD TAB ─────────────────────────────────────────────
function LeaderboardTab({state,setState,course,tee,chcps,holeResults,segTotals,grandTotal,history,setHistory}){
  const [dollarsPerPt,setDollarsPerPt]=useState(state.dollarPerPt||1);
  useEffect(()=>{setState(s=>({...s,dollarPerPt:dollarsPerPt}))},[dollarsPerPt]);
  const [copied,setCopied]=useState(false);

  const f9par=course?course.par.slice(0,9).reduce((s,p)=>s+p,0):36;
  const b9par=course?course.par.slice(9).reduce((s,p)=>s+p,0):36;
  const totalPar=f9par+b9par;

  // Use the shared PLAYER_COLORS list so leaderboard and setup tabs match.
  const playerColors=PLAYER_COLORS;

  // Per-hole net from a player's perspective: (their team's pts) − (opp team's pts).
  // Positive when their team won the hole, negative when they lost, 0 on ties or
  // holes with no score entered for that player.
  function playerHoleNet(pi,holeIdx){
    if(state.holes[holeIdx].scores[pi]==null)return 0;
    const r=holeResults[holeIdx];
    const seg=segOfHoleIdx(holeIdx);
    const{a:teamA}=getTeamForSeg(seg);
    const isTeamA=teamA.includes(pi);
    return isTeamA?(r.pts.a-r.pts.b):(r.pts.b-r.pts.a);
  }

  // Per-player gross points total across all holes
  // Both players on a team receive the same gross points — team points from holeResults
  function playerTotalPts(pi){
    return holeResults.reduce((sum,r,holeIdx)=>{
      const seg=segOfHoleIdx(holeIdx);
      const{a:teamA,b:teamB}=getTeamForSeg(seg);
      const isTeamA=teamA.includes(pi);
      // Only count if this player has entered a score on this hole
      if(state.holes[holeIdx].scores[pi]==null)return sum;
      return sum+(isTeamA?r.pts.a:r.pts.b);
    },0);
  }

  // Per-player gross points per segment — teammates always get the same pts
  function playerSegPts(pi,seg){
    const hps=getHolesPerSeg();
    const start=seg*hps;
    return holeResults.slice(start,Math.min(start+hps,18)).reduce((sum,r,si)=>{
      const holeIdx=start+si;
      const{a:teamA,b:teamB}=getTeamForSeg(seg);
      const isTeamA=teamA.includes(pi);
      if(state.holes[holeIdx].scores[pi]==null)return sum;
      return sum+(isTeamA?r.pts.a:r.pts.b);
    },0);
  }

  // Per-player net total across all holes (sum of per-hole margins)
  function playerTotalNet(pi){
    let sum=0;
    for(let i=0;i<18;i++)sum+=playerHoleNet(pi,i);
    return sum;
  }

  // Per-player net per segment
  function playerSegNet(pi,seg){
    const hps=getHolesPerSeg();
    const start=seg*hps;
    let sum=0;
    for(let i=start;i<Math.min(start+hps,18);i++)sum+=playerHoleNet(pi,i);
    return sum;
  }

  const allPlayerPts=state.players.map((_,pi)=>playerTotalPts(pi));
  const allPlayerNets=state.players.map((_,pi)=>playerTotalNet(pi));
  const maxPts=Math.max(...allPlayerPts,1);

  // Ranked order — by NET, since that's what determines payouts now.
  const ranked=[...state.players.map((_,i)=>i)].sort((a,b)=>allPlayerNets[b]-allPlayerNets[a]);

  // Minimum-transaction settlement.
  // Each player's net is already in points (sums to zero). Greedy match the
  // largest creditor (positive net) against the largest debtor (negative net),
  // settle by min(creditor, |debtor|), and repeat. With 4 players this produces
  // at most 3 transactions and is always optimal because a 0-sum vector of
  // 4 values can never need more than n−1 edges to clear.
  function settlePayments(){
    // Work in points so we can show both points-owed and dollars-owed.
    const creditors=[],debtors=[];
    allPlayerNets.forEach((n,pi)=>{
      if(n>0)creditors.push({pi,amt:n});
      else if(n<0)debtors.push({pi,amt:-n});
    });
    creditors.sort((a,b)=>b.amt-a.amt);
    debtors.sort((a,b)=>b.amt-a.amt);
    const txs=[];
    let ci=0,di=0;
    while(ci<creditors.length&&di<debtors.length){
      const c=creditors[ci],d=debtors[di];
      const pay=Math.min(c.amt,d.amt);
      if(pay>0){
        txs.push({from:d.pi,to:c.pi,points:pay,dollars:pay*dollarsPerPt});
      }
      c.amt-=pay; d.amt-=pay;
      if(c.amt===0)ci++;
      if(d.amt===0)di++;
    }
    return txs;
  }

  function scoreCell(gross,par){
    if(!gross)return h('span',{style:{color:'var(--text3)'}},'—');
    const diff=gross-par;
    let cls='cell-par';
    if(diff<=-2)cls='cell-eagle';
    else if(diff===-1)cls='cell-birdie';
    else if(diff===1)cls='cell-bogey';
    else if(diff>=2)cls='cell-double';
    return h('span',{className:cls},gross);
  }

  const playerGross=state.players.map((_,pi)=>{
    const f9=state.holes.slice(0,9).reduce((s,h)=>s+(h.scores[pi]||0),0);
    const b9=state.holes.slice(9).reduce((s,h)=>s+(h.scores[pi]||0),0);
    return{f9,b9,total:f9+b9};
  });

  const anyScored=allPlayerPts.some(p=>p>0);

  // ── Share results as text (clipboard) ──────────────────────────
  function fallbackCopy(text){
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy');}catch{}
    document.body.removeChild(ta);
  }
  function shareResults(){
    const dateStr=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const lines=[];
    lines.push(`SIX-POINT SCOTCH — ${course?.name||''}${tee?` (${tee.name})`:''}`);
    lines.push(dateStr);
    lines.push('');
    lines.push('Standings (net):');
    ranked.forEach((pi,rk)=>{
      const n=allPlayerNets[pi];
      lines.push(`${rk+1}. ${state.players[pi].name}  ${(n>0?'+':'')+n}  (${allPlayerPts[pi]} pts)`);
    });
    const txs=settlePayments();
    if(txs.length){
      lines.push('');
      lines.push('Settlement:');
      txs.forEach(t=>lines.push(`${state.players[t.from].name} pays ${state.players[t.to].name} $${t.dollars.toFixed(2)} (${t.points} pts)`));
    }
    const umbrellas=holeResults.filter(r=>r.umbrella).length;
    if(umbrellas>0){
      lines.push('');
      lines.push(`☂ Umbrellas: ${umbrellas}`);
    }
    const text=lines.join('\n');
    const done=()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{fallbackCopy(text);done();});
    }else{
      fallbackCopy(text);done();
    }
  }

  return h('div',{className:'page'},

    // ── Share button ──────────────────────────────────────────────
    anyScored&&h('button',{
      className:'btn btn-ghost',
      style:{width:'100%',marginBottom:14,borderColor:copied?'var(--green)':'var(--border2)',color:copied?'var(--green)':'var(--text1)'},
      onClick:shareResults
    },copied?'✓ Copied to clipboard':'📋 Share Results'),

    // ── Gross Scores ─────────────────────────────────────────────
    h('div',{className:'section-title'},'Gross Scores'),
    h('div',{style:{overflowX:'auto',borderRadius:8,border:'1px solid var(--border)'}},
      h('table',{className:'gross-table',style:{minWidth:340}},
        h('thead',null,
          h('tr',null,
            h('th',{style:{textAlign:'left',paddingLeft:10}},'Player'),
            h('th',null,'F9'),h('th',null,'B9'),h('th',null,'TOT'),h('th',null,'vs Par')
          )
        ),
        h('tbody',null,
          state.players.map((p,pi)=>{
            const g=playerGross[pi];
            const vpar=g.total-totalPar;
            return h('tr',{key:pi},
              h('td',{style:{textAlign:'left',paddingLeft:10,fontWeight:500,color:playerColors[pi]}},p.name),
              h('td',null,g.f9||'—'),
              h('td',null,g.b9||'—'),
              h('td',null,g.total||'—'),
              h('td',null,g.total?h('span',{className:`badge ${vpar<0?'badge-red':vpar===0?'':'badge-blue'}`},vpar<0?vpar:'+'+vpar):h('span',{style:{color:'var(--text3)'}},'—'))
            );
          })
        )
      )
    ),

    // ── Individual Standings ──────────────────────────────────────
    h('div',{className:'section-title'},'Points Standings'),
    ...ranked.map((pi,rank)=>{
      const pts=allPlayerPts[pi];
      const net=allPlayerNets[pi];
      const col=playerColors[pi];
      // Progress bar based on absolute net vs the largest absolute net in the field
      const maxAbsNet=Math.max(...allPlayerNets.map(n=>Math.abs(n)),1);
      const pct=Math.abs(net)/maxAbsNet*100;
      const netCol=net>0?'var(--green)':net<0?'var(--red)':'var(--text2)';
      // Use the colorToRgba helper so this works for every player color,
      // not just the gold/CSS-variable case the original replace-chain handled.
      const borderCol=colorToRgba(col,0.35)||'var(--border)';
      return h('div',{key:pi,className:'lb-team-card',style:{borderColor:borderCol,marginBottom:8}},
        h('div',{className:'lb-team-header'},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:6}},
              h('div',{style:{width:28,height:28,borderRadius:'50%',background:col,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:'#0d1117',flexShrink:0}},rank+1),
              h('div',{className:'lb-team-name',style:{color:col,fontSize:20}},state.players[pi].name),
              h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace",marginLeft:'auto'}},`HCP ${chcps[pi]}`)
            ),
            // Per-segment breakdown — shows both gross and net so the
            // running team-pts column is still visible alongside what
            // actually drives the payout.
            h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${getSegCount()},1fr)`,gap:5,marginBottom:8}},
              Array.from({length:getSegCount()},(_,seg)=>{
                const{a:teamA,b:teamB}=getTeamForSeg(seg);
                const partner=teamA.includes(pi)
                  ?teamA.filter(i=>i!==pi).map(i=>state.players[i].name)[0]
                  :teamB.filter(i=>i!==pi).map(i=>state.players[i].name)[0];
                const sp=playerSegPts(pi,seg);
                const sn=playerSegNet(pi,seg);
                const snCol=sn>0?'var(--green)':sn<0?'var(--red)':'var(--text2)';
                return h('div',{key:seg,style:{textAlign:'center',background:'var(--surface3)',borderRadius:6,padding:'6px 4px'}},
                  h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:snCol,lineHeight:1}},
                    (sn>0?'+':'')+sn),
                  h('div',{style:{fontSize:9,color:'var(--text3)',marginTop:1}},`(${sp} pts)`),
                  h('div',{style:{fontSize:8,color:'var(--text3)',fontFamily:"'DM Mono',monospace",letterSpacing:'0.08em',marginTop:3}},getSegShortNames()[seg]),
                  h('div',{style:{fontSize:9,color:'var(--text2)',marginTop:2}},`w/ ${partner}`)
                );
              })
            ),
            h('div',{className:'progress-track'},
              h('div',{className:'progress-fill',style:{width:`${pct}%`,background:netCol}})
            )
          ),
          h('div',{style:{textAlign:'right',paddingLeft:12}},
            h('div',{className:'lb-pts-big',style:{color:netCol}},(net>0?'+':'')+net),
            h('div',{className:'lb-pts-label'},`net · ${pts} pts`)
          )
        )
      );
    }),

    // ── Payout Calculator ─────────────────────────────────────────
    h('div',{className:'section-title'},'Payout Calculator'),
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}},
        h('label',{className:'label',style:{marginBottom:0,whiteSpace:'nowrap'}},'$ per point'),
        h('input',{type:'number',className:'input',style:{width:80},value:dollarsPerPt,min:0,step:0.5,
          onChange:e=>setDollarsPerPt(parseFloat(e.target.value)||0)})
      ),
      h('div',{className:'divider'}),
      // Net summary row — shows each player's net before the settlement
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6,marginBottom:14}},
        state.players.map((p,pi)=>{
          const net=allPlayerNets[pi];
          const netCol=net>0?'var(--green)':net<0?'var(--red)':'var(--text2)';
          return h('div',{key:pi,style:{background:'var(--surface3)',borderRadius:6,padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
            h('span',{style:{fontSize:12,color:playerColors[pi],fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'60%'}},p.name),
            h('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:netCol}},(net>0?'+':'')+net)
          );
        })
      ),
      !anyScored
        ?h('div',{style:{color:'var(--text2)',fontSize:13,textAlign:'center',padding:'12px 0'}},'No points scored yet')
        :(()=>{
          const txs=settlePayments();
          if(txs.length===0)return h('div',{style:{color:'var(--text2)',fontSize:13,textAlign:'center',padding:'8px 0'}},'All square — no payments');
          return h('div',null,
            h('div',{style:{fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',color:'var(--text3)',marginBottom:6,textTransform:'uppercase'}},'Settlement'),
            ...txs.map((t,idx)=>
              h('div',{key:idx,className:'payout-row'},
                h('span',{style:{fontSize:13,display:'flex',alignItems:'baseline',gap:6,flexWrap:'wrap'}},
                  h('span',{style:{color:playerColors[t.from],fontWeight:600}},state.players[t.from].name),
                  h('span',{style:{color:'var(--text3)'}},'pays'),
                  h('span',{style:{color:playerColors[t.to],fontWeight:600}},state.players[t.to].name),
                  h('span',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace"}},`(${t.points} pts)`)
                ),
                h('span',{className:'payout-amount earn'},'$'+t.dollars.toFixed(2))
              )
            ),
            h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:10,textAlign:'center',fontStyle:'italic'}},
              `Settled in ${txs.length} payment${txs.length===1?'':'s'}.`)
          );
        })()
    ),

    // ── Hole-by-Hole ──────────────────────────────────────────────
    h('div',{className:'section-title'},'Hole-by-Hole'),
    h('div',{style:{overflowX:'auto',borderRadius:8,border:'1px solid var(--border)'}},
      h('table',{className:'gross-table',style:{minWidth:420}},
        h('thead',null,
          h('tr',null,
            h('th',{style:{textAlign:'left',paddingLeft:6}},'#'),
            h('th',null,'Par'),
            ...state.players.map((p,i)=>h('th',{key:i,style:{color:playerColors[i]}},p.name.split(' ')[0])),
            h('th',null,'☂'),h('th',null,'×'),
          )
        ),
        h('tbody',null,
          Array.from({length:18},(_,i)=>{
            const r=holeResults[i];
            const par=course?.par[i]||4;
            const seg=segOfHoleIdx(i);
            return h('tr',{key:i,style:{background:i===state.currentHole?'rgba(212,168,67,0.07)':seg%2===1?'rgba(255,255,255,0.02)':''}},
              h('td',{style:{textAlign:'left',paddingLeft:6,fontFamily:"'DM Mono',monospace",fontSize:11}},i+1),
              h('td',null,par),
              ...state.players.map((p,pi)=>h('td',{key:pi},scoreCell(state.holes[i].scores[pi],par))),
              h('td',null,r.umbrella?h('span',{className:'badge badge-gold'},'☂'):'—'),
              h('td',null,r.multiplier>1?h('span',{className:'badge badge-red'},`×${r.multiplier}`):'—'),
            );
          })
        ),
        h('tfoot',null,
          h('tr',{style:{borderTop:'2px solid var(--border2)'}},
            h('td',{colSpan:2,style:{textAlign:'left',paddingLeft:6,fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600}},'TOTAL'),
            ...state.players.map((_,pi)=>{
              const tot=state.holes.reduce((s,h)=>s+(h.scores[pi]||0),0);
              return h('td',{key:pi,style:{fontWeight:600,color:playerColors[pi]}},tot||'—');
            }),
            h('td',{colSpan:2})
          )
        )
      )
    ),

    // ── Round History ─────────────────────────────────────────────
    h('div',{className:'section-title',style:{marginTop:20}},'Round History'),
    (!history||history.length===0)
      ?h('div',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'16px',textAlign:'center',color:'var(--text3)',fontSize:13,fontStyle:'italic'}},
          'No saved rounds yet. Finished rounds are archived automatically when you reset or start a new round.')
      :h('div',null,
          ...history.map((rec,ri)=>{
            const d=new Date(rec.date);
            const dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            const sorted=[...rec.players].sort((a,b)=>(b.net||0)-(a.net||0));
            return h('details',{key:ri,className:'card',style:{marginBottom:8}},
              h('summary',{style:{padding:0}},
                h('div',{style:{flex:1}},
                  h('div',{style:{fontWeight:600,fontSize:14}},`${dateStr} — ${rec.courseName}${rec.teeName?` (${rec.teeName})`:''}`),
                  h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace",marginTop:3}},
                    `${rec.players.map(p=>p.name).join(' · ')}  ·  ${rec.holesPlayed}/18 holes${rec.umbrellas?`  ·  ☂×${rec.umbrellas}`:''}`)
                ),
                h('span',{className:'chevron'},'▼')
              ),
              h('div',{style:{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}},
                // Standings
                h('div',{className:'label',style:{marginBottom:6}},'Final Standings'),
                ...sorted.map((p,rk)=>{
                  const netCol=p.net>0?'var(--green)':p.net<0?'var(--red)':'var(--text2)';
                  return h('div',{key:rk,style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'4px 0'}},
                    h('span',{style:{fontSize:13}},`${rk+1}. ${p.name}`,
                      h('span',{style:{fontSize:11,color:'var(--text3)',marginLeft:8,fontFamily:"'DM Mono',monospace"}},
                        `gross ${p.gross||'—'}  ·  ${p.pts} pts`)),
                    h('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:netCol}},(p.net>0?'+':'')+p.net)
                  );
                }),
                // Settlement
                rec.settlement&&rec.settlement.length>0&&h('div',{style:{marginTop:10}},
                  h('div',{className:'label',style:{marginBottom:6}},'Settlement'),
                  ...rec.settlement.map((t,ti)=>
                    h('div',{key:ti,style:{fontSize:12,color:'var(--text2)',padding:'3px 0'}},
                      `${t.from} paid ${t.to} $${(t.dollars||0).toFixed(2)} (${t.points} pts)`)
                  )
                ),
                // Delete
                h('div',{style:{marginTop:12}},
                  h('button',{
                    className:'btn btn-danger btn-sm',
                    onClick:e=>{
                      e.preventDefault();
                      setHistory(hst=>hst.filter((_,idx)=>idx!==ri));
                    }
                  },'Delete Round')
                )
              )
            );
          })
        )
  );
}

// ─── SETUP TAB ────────────────────────────────────────────────────
function SetupTab({state,setState,courses,course,tee,chcps,coursePar,clearRound}){
  const updatePlayer=(i,key,val)=>setState(s=>{
    const players=[...s.players];
    players[i]={...players[i],[key]:val};
    return{...s,players};
  });

  const [confirmNew,setConfirmNew]=useState(false);
  const [roster,setRosterState]=useState(()=>loadRoster());
  const [rosterView,setRosterView]=useState(false); // show/hide roster manager
  const [newEntry,setNewEntry]=useState({name:'',ghin:'',hi:''});
  const [editRosterIdx,setEditRosterIdx]=useState(null);
  const playerColors=PLAYER_COLORS;

  // Persist roster to localStorage whenever it changes
  useEffect(()=>saveRoster(roster),[roster]);

  function saveRosterEntry(){
    if(!newEntry.name.trim())return;
    const entry={name:newEntry.name.trim(),ghin:newEntry.ghin.trim(),hi:newEntry.hi};
    if(editRosterIdx!=null){
      setRosterState(r=>r.map((e,i)=>i===editRosterIdx?entry:e));
      setEditRosterIdx(null);
    } else {
      setRosterState(r=>[...r,entry]);
    }
    setNewEntry({name:'',ghin:'',hi:''});
  }

  function deleteRosterEntry(i){
    setRosterState(r=>r.filter((_,idx)=>idx!==i));
    if(editRosterIdx===i)setEditRosterIdx(null);
  }

  function startEditRoster(i){
    setEditRosterIdx(i);
    setNewEntry({...roster[i]});
  }

  function assignFromRoster(slotIdx,rosterEntry){
    updatePlayer(slotIdx,'name',rosterEntry.name);
    updatePlayer(slotIdx,'hi',rosterEntry.hi||'');
  }

  function newRound(){
    clearRound({clearPlayers:true});
    setState(s=>({...s,tab:'scoring'}));
    setConfirmNew(false);
  }

  return h('div',{className:'page'},

    // ── New Round banner ─────────────────────────────────────────
    !confirmNew
      ?h('button',{
          className:'btn btn-primary',
          style:{width:'100%',marginBottom:16,fontSize:15,padding:'14px',letterSpacing:'0.04em'},
          onClick:()=>setConfirmNew(true)
        },'⛳  New Round')
      :h('div',{style:{background:'var(--amber-dim)',border:'1px solid rgba(245,158,11,0.4)',borderRadius:10,padding:'14px 16px',marginBottom:16}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'var(--amber)',marginBottom:10}},'Start a new round?'),
          h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:12}},'Scores, player names, and handicaps will be cleared. Course and tee settings are kept.'),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{
              className:'btn btn-primary',
              style:{flex:1},
              onClick:newRound
            },'Yes, New Round'),
            h('button',{
              className:'btn btn-ghost',
              style:{flex:1},
              onClick:()=>setConfirmNew(false)
            },'Cancel')
          )
        ),

    h('div',{className:'section-title'},'Game Format'),
    h('div',{className:'card'},
      h('div',{className:'col'},
        Object.entries(FORMATS).map(([key,f])=>
          h('label',{key,style:{
            display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
            background:(state.format||'six')===key?'var(--amber-dim)':'var(--surface3)',
            border:`1.5px solid ${(state.format||'six')===key?'var(--gold)':'var(--border)'}`,
            borderRadius:8,cursor:'pointer',transition:'all 0.15s'
          }},
            h('input',{
              type:'radio',name:'gameFormat',value:key,
              checked:(state.format||'six')===key,
              onChange:()=>setState(s=>({...s,format:key})),
              style:{accentColor:'#d4a843'}
            }),
            h('div',null,
              h('div',{style:{fontSize:14,fontWeight:600,color:(state.format||'six')===key?'var(--gold)':'var(--text1)'}},f.label),
              h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},
                f.segs===1?'One 18-hole match, fixed teams':`${f.segs} segments of ${f.holesPerSeg} holes each`)
            )
          )
        ),
        h('div',{style:{fontSize:11,color:'var(--text3)',fontStyle:'italic',marginTop:2}},
          'Changing format mid-round recalculates all points with the new team rotation.')
      )
    ),

    h('div',{className:'section-title'},'Course & Tee'),
    h('div',{className:'card'},
      h('div',{className:'col'},
        h('div',null,
          h('label',{className:'label'},'Course'),
          h('select',{
            className:'input select',
            value:state.courseId,
            onChange:e=>setState(s=>({...s,courseId:e.target.value,teeIdx:0}))
          },
            courses.map(c=>h('option',{key:c.id,value:c.id},c.name+' — '+c.city))
          )
        ),
        h('div',null,
          h('label',{className:'label'},'Tee'),
          h('select',{
            className:'input select',
            value:state.teeIdx,
            onChange:e=>setState(s=>({...s,teeIdx:parseInt(e.target.value)}))
          },
            (course?.tees||[]).map((t,i)=>h('option',{key:i,value:i},
              `${t.name} — Rating ${t.rating}, Slope ${t.slope}`
            ))
          )
        ),
        tee&&h('div',{style:{background:'var(--surface3)',borderRadius:6,padding:'10px 12px',display:'flex',gap:16}},
          h('div',null,h('div',{className:'label'},'Rating'),h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20}},tee.rating)),
          h('div',null,h('div',{className:'label'},'Slope'),h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20}},tee.slope)),
          h('div',null,h('div',{className:'label'},'Par'),h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20}},coursePar)),
        )
      )
    ),

    h('div',{className:'section-title'},'Players & Handicaps'),
    ...state.players.map((p,i)=>
      h('div',{key:i,className:'player-setup-card',style:{borderLeft:`3px solid ${playerColors[i]}`}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
          h('div',{style:{width:22,height:22,borderRadius:'50%',background:playerColors[i],display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:'#0d1117',flexShrink:0}},i+1),
          h('span',{style:{fontSize:13,fontWeight:600,color:playerColors[i]}},p.name||'Player '+(i+1))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 100px',gap:8}},
          h('div',null,
            h('label',{className:'label'},'Name'),
            roster.length>0
              ?h('select',{
                  className:'input select',
                  value:'',
                  onChange:e=>{
                    if(e.target.value==='__manual__')return;
                    const ri=parseInt(e.target.value);
                    if(!isNaN(ri)&&roster[ri])assignFromRoster(i,roster[ri]);
                  }
                },
                h('option',{value:'__manual__'},p.name||'— pick from roster —'),
                ...roster.map((r,ri)=>h('option',{key:ri,value:String(ri)},r.name+(r.hi?` (HI ${r.hi})`:'')+(r.ghin?` · GHIN ${r.ghin}`:'')))
              )
              :h('input',{className:'input',value:p.name,onChange:e=>updatePlayer(i,'name',e.target.value),placeholder:'Player '+(i+1)})
          ),
          h('div',null,
            h('label',{className:'label'},'HI'),
            h('input',{className:'input',type:'number',value:p.hi,step:0.1,min:-10,max:54,
              onChange:e=>updatePlayer(i,'hi',e.target.value),placeholder:'e.g. 12.4'})
          )
        ),
        // Manual name override when roster is active
        roster.length>0&&h('div',{style:{marginTop:6}},
          h('label',{className:'label'},'Name (edit)'),
          h('input',{className:'input',value:p.name,onChange:e=>updatePlayer(i,'name',e.target.value),placeholder:'Player '+(i+1)})
        ),
        h('div',{style:{marginTop:8,display:'flex',gap:16,background:'var(--surface3)',borderRadius:6,padding:'8px 12px'}},
          h('div',null,
            h('div',{className:'label'},'Course HCP'),
            h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:playerColors[i]}},
              isNaN(parseFloat(p.hi))?'—':chcps[i]
            )
          ),
          h('div',null,
            h('div',{className:'label'},'Formula'),
            h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}},
              `HI×(${tee?.slope||'?'}/113)+(${tee?.rating||'?'}−${coursePar})`
            )
          )
        )
      )
    ),

    h('div',{className:'section-title'},'Partnership Rotation'),
    h('div',{className:'card'},
      h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:12}},getFmt().desc),
      ...Array.from({length:getSegCount()},(_,seg)=>{
        const{a,b}=getTeamForSeg(seg);
        const segCol=`var(--seg${seg})`;
        return h('div',{key:seg,style:{marginBottom:seg<2?12:0}},
          h('div',{style:{fontSize:10,fontFamily:"'DM Mono',monospace",letterSpacing:'0.15em',color:segCol,marginBottom:5}},
            getSegNames()[seg].toUpperCase()+' · HOLES '+(seg*getHolesPerSeg()+1)+'–'+Math.min((seg+1)*getHolesPerSeg(),18)
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},
            h('div',{style:{flex:1,background:'var(--surface3)',borderRadius:6,padding:'8px 10px',display:'flex',gap:6,alignItems:'center'}},
              ...a.map(i=>h('span',{key:i,style:{fontWeight:600,fontSize:13,color:playerColors[i]}},state.players[i].name)),
            ),
            h('div',{style:{color:'var(--text3)',fontSize:12,flexShrink:0}},'vs'),
            h('div',{style:{flex:1,background:'var(--surface3)',borderRadius:6,padding:'8px 10px',display:'flex',gap:6,alignItems:'center'}},
              ...b.map(i=>h('span',{key:i,style:{fontWeight:600,fontSize:13,color:playerColors[i]}},state.players[i].name)),
            )
          )
        );
      })
    ),

    // ── Player Roster ──────────────────────────────────────────────
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,marginBottom:10}},
      h('div',{className:'section-title',style:{marginBottom:0}},'Player Roster'),
      h('button',{
        className:'btn btn-ghost btn-sm',
        onClick:()=>{setRosterView(v=>!v);setEditRosterIdx(null);setNewEntry({name:'',ghin:'',hi:''});}
      },rosterView?'Done':'Manage Roster')
    ),

    // Roster quick-summary when not in edit mode
    !rosterView&&roster.length>0&&h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
      roster.map((r,ri)=>
        h('div',{key:ri,style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}},
          h('div',null,
            h('div',{style:{fontWeight:600,fontSize:14,color:'var(--text1)'}},r.name),
            h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace",marginTop:2}},
              [r.ghin?`GHIN ${r.ghin}`:'',r.hi?`HI ${r.hi}`:''].filter(Boolean).join('  ·  ')||'No HI or GHIN saved'
            )
          ),
          h('div',{style:{display:'flex',gap:6}},
            h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setRosterView(true);startEditRoster(ri);}},'Edit'),
          )
        )
      )
    ),
    !rosterView&&roster.length===0&&h('div',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'16px',textAlign:'center',color:'var(--text3)',fontSize:13,fontStyle:'italic'}},'No saved players yet. Tap Manage Roster to add players.'),

    // Full roster manager
    rosterView&&h('div',{className:'card'},

      // Existing entries
      roster.length>0&&h('div',{style:{marginBottom:16}},
        h('div',{className:'label',style:{marginBottom:8}},'Saved Players'),
        roster.map((r,ri)=>
          h('div',{key:ri,style:{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'10px 12px',marginBottom:6,
            background:editRosterIdx===ri?'rgba(212,168,67,0.08)':'var(--surface3)',
            border:`1px solid ${editRosterIdx===ri?'var(--gold)':'var(--border)'}`,
            borderRadius:8
          }},
            h('div',null,
              h('div',{style:{fontWeight:600,fontSize:14,color:editRosterIdx===ri?'var(--gold)':'var(--text1)'}},r.name),
              h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace",marginTop:2}},
                [r.ghin?`GHIN ${r.ghin}`:'',r.hi?`HI ${r.hi}`:''].filter(Boolean).join('  ·  ')||'—'
              )
            ),
            h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>startEditRoster(ri)},editRosterIdx===ri?'Editing…':'Edit'),
              h('button',{className:'btn btn-danger btn-sm',onClick:()=>deleteRosterEntry(ri)},'✕')
            )
          )
        )
      ),

      // Add / edit form
      h('div',null,
        h('div',{className:'label',style:{marginBottom:8}},editRosterIdx!=null?'Edit Player':'Add Player'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}},
          h('div',null,
            h('label',{className:'label'},'Name *'),
            h('input',{
              className:'input',value:newEntry.name,placeholder:'e.g. Doug',
              onChange:e=>setNewEntry(n=>({...n,name:e.target.value}))
            })
          ),
          h('div',null,
            h('label',{className:'label'},'HI'),
            h('input',{
              className:'input',type:'number',value:newEntry.hi,placeholder:'e.g. 7.7',
              step:0.1,min:-10,max:54,
              onChange:e=>setNewEntry(n=>({...n,hi:e.target.value}))
            })
          )
        ),
        h('div',{style:{marginBottom:12}},
          h('label',{className:'label'},'GHIN Number'),
          h('input',{
            className:'input',value:newEntry.ghin,placeholder:'e.g. 1234567',
            onChange:e=>setNewEntry(n=>({...n,ghin:e.target.value}))
          }),
          h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:5,fontStyle:'italic'}},
            'GHIN is saved for reference. Update HI manually before each round from the GHIN app.'
          )
        ),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{
            className:'btn btn-primary',
            style:{flex:1},
            onClick:saveRosterEntry,
            disabled:!newEntry.name.trim()
          },editRosterIdx!=null?'Save Changes':'Add to Roster'),
          editRosterIdx!=null&&h('button',{
            className:'btn btn-ghost',
            onClick:()=>{setEditRosterIdx(null);setNewEntry({name:'',ghin:'',hi:''});}
          },'Cancel')
        )
      )
    ),
  );
}

// ─── COURSES TAB ─────────────────────────────────────────────────
function CoursesTab({state,setState,courses}){
  const [view,setView]=useState('list'); // 'list' | 'add' | 'edit'
  const [editCourse,setEditCourse]=useState(null);
  const [errors,setErrors]=useState({});

  function blankCourse(){
    return{
      id:'custom_'+Date.now(),
      name:'',city:'',
      par:Array(18).fill(4),
      hcp:Array(18).fill(null).map((_,i)=>i+1),
      tees:[{name:'Blue',slope:113,rating:72.0,default:true}],
      builtIn:false
    };
  }

  const [draftCourse,setDraftCourse]=useState(blankCourse());

  function openAdd(){setDraftCourse(blankCourse());setErrors({});setView('add');}
  function openEdit(c){setDraftCourse(JSON.parse(JSON.stringify(c)));setErrors({});setView('edit');}

  function validateDraft(d){
    const e={};
    if(!d.name.trim())e.name='Required';
    const hcps=d.hcp.filter(v=>v!=null&&!isNaN(v));
    const uniq=new Set(hcps);
    if(uniq.size!==18||hcps.some(v=>v<1||v>18))e.hcp='Each hole needs a unique HCP rank 1–18';
    if(!d.tees.length)e.tees='At least one tee required';
    d.tees.forEach((t,i)=>{if(!t.name.trim())e['tee_'+i]='Name required';});
    return e;
  }

  function saveDraft(){
    const e=validateDraft(draftCourse);
    if(Object.keys(e).length){setErrors(e);return;}
    setState(s=>{
      if(view==='add'){
        return{...s,customCourses:[...(s.customCourses||[]),draftCourse]};
      } else {
        // edit: could be custom or built-in (editable)
        const ci=courses.findIndex(c=>c.id===draftCourse.id);
        if(ci<0)return s;
        if(draftCourse.builtIn){
          // store override in customCourses
          const existing=s.customCourses||[];
          const eidx=existing.findIndex(c=>c.id===draftCourse.id+'_edit');
          // actually just store as modified built-in override
          const mod={...draftCourse,builtIn:false,originalId:draftCourse.id,id:draftCourse.id+'_edited'};
          // simpler: just update state's customCourses to include an "edited" version
          const filtered=existing.filter(c=>c.originalId!==draftCourse.id);
          return{...s,customCourses:[...filtered,mod]};
        } else {
          const cc=[...(s.customCourses||[])];
          const idx=cc.findIndex(c=>c.id===draftCourse.id);
          if(idx>=0)cc[idx]=draftCourse;
          return{...s,customCourses:cc};
        }
      }
    });
    setView('list');
  }

  function deleteCourse(id){
    if(!confirm('Delete this course?'))return;
    setState(s=>({...s,customCourses:(s.customCourses||[]).filter(c=>c.id!==id)}));
  }

  function updateDraftHole(field,idx,val){
    setDraftCourse(d=>{
      const arr=[...d[field]];
      arr[idx]=field==='hcp'?parseInt(val)||null:parseInt(val)||3;
      return{...d,[field]:arr};
    });
  }
  function updateDraftTee(i,key,val){
    setDraftCourse(d=>{
      const tees=[...d.tees];
      tees[i]={...tees[i],[key]:key==='slope'||key==='rating'?parseFloat(val)||0:val};
      return{...d,tees};
    });
  }
  function addTee(){setDraftCourse(d=>({...d,tees:[...d.tees,{name:'',slope:113,rating:72.0}]}));}
  function removeTee(i){setDraftCourse(d=>({...d,tees:d.tees.filter((_,idx)=>idx!==i)}));}

  if(view==='list'){
    return h('div',{className:'page'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',{className:'section-title',style:{marginBottom:0}},'Courses'),
        h('button',{className:'btn btn-primary btn-sm',onClick:openAdd},'+ Add Course')
      ),
      ...courses.map(c=>
        h('div',{key:c.id,className:'card',style:{marginBottom:8}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',null,
              h('div',{style:{fontWeight:600,fontSize:16}},c.name),
              h('div',{style:{fontSize:12,color:'var(--text2)'}},c.city),
              h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:4}},
                `${c.tees.length} tee${c.tees.length!==1?'s':''} · Par ${c.par.reduce((s,p)=>s+p,0)}`
              )
            ),
            h('div',{style:{display:'flex',gap:6,flexShrink:0}},
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>openEdit(c)},'Edit'),
              !c.builtIn&&h('button',{className:'btn btn-danger btn-sm',onClick:()=>deleteCourse(c.id)},'Del')
            )
          ),
          // Scorecard preview
          h('details',{style:{marginTop:10}},
            h('summary',{style:{fontSize:12,color:'var(--text2)',cursor:'pointer'}},
              'Scorecard preview ',h('span',{className:'chevron'},'▼')
            ),
            h('div',{style:{overflowX:'auto',marginTop:8}},
              h('table',{className:'gross-table',style:{minWidth:480}},
                h('thead',null,
                  h('tr',null,
                    h('th',null,'Hole'),
                    ...Array.from({length:18},(_,i)=>h('th',{key:i},i+1))
                  )
                ),
                h('tbody',null,
                  h('tr',null,h('td',{style:{textAlign:'left',paddingLeft:6,fontWeight:600}},'Par'),...c.par.map((p,i)=>h('td',{key:i},p))),
                  h('tr',null,h('td',{style:{textAlign:'left',paddingLeft:6,fontWeight:600}},'HCP'),...c.hcp.map((p,i)=>h('td',{key:i},p))),
                  c.tees.map(t=>h('tr',{key:t.name},
                    h('td',{style:{textAlign:'left',paddingLeft:6,color:'var(--text2)',fontSize:11}},t.name),
                    h('td',{colSpan:18,style:{textAlign:'left',color:'var(--text3)',fontSize:11}},`Rating ${t.rating} / Slope ${t.slope}`)
                  ))
                )
              )
            )
          )
        )
      )
    );
  }

  // Add / Edit form
  return h('div',{className:'page'},
    h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
      h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setView('list')},'← Back'),
      h('div',{className:'section-title',style:{marginBottom:0}},view==='add'?'Add Course':'Edit Course')
    ),

    h('div',{className:'card'},
      h('div',{className:'col'},
        h('div',null,
          h('label',{className:'label'},'Course Name *'),
          h('input',{className:'input',value:draftCourse.name,placeholder:'e.g. Pebble Beach GC',
            onChange:e=>setDraftCourse(d=>({...d,name:e.target.value}))}),
          errors.name&&h('div',{style:{color:'var(--red)',fontSize:12,marginTop:4}},errors.name)
        ),
        h('div',null,
          h('label',{className:'label'},'City / State'),
          h('input',{className:'input',value:draftCourse.city,placeholder:'e.g. Pebble Beach, CA',
            onChange:e=>setDraftCourse(d=>({...d,city:e.target.value}))})
        )
      )
    ),

    // Tees
    h('div',{className:'section-title'},'Tees'),
    ...draftCourse.tees.map((t,i)=>
      h('div',{key:i,className:'card',style:{marginBottom:6}},
        h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},
          h('div',{style:{flex:'1 1 100px'}},
            h('label',{className:'label'},'Name'),
            h('input',{className:'input',value:t.name,placeholder:'Blue',
              onChange:e=>updateDraftTee(i,'name',e.target.value)}),
            errors['tee_'+i]&&h('div',{style:{color:'var(--red)',fontSize:11}},errors['tee_'+i])
          ),
          h('div',{style:{width:80}},
            h('label',{className:'label'},'Rating'),
            h('input',{className:'input',type:'number',step:0.1,value:t.rating,
              onChange:e=>updateDraftTee(i,'rating',e.target.value)})
          ),
          h('div',{style:{width:70}},
            h('label',{className:'label'},'Slope'),
            h('input',{className:'input',type:'number',value:t.slope,
              onChange:e=>updateDraftTee(i,'slope',e.target.value)})
          ),
          draftCourse.tees.length>1&&h('button',{className:'btn btn-danger btn-icon btn-sm',style:{marginBottom:1},
            onClick:()=>removeTee(i)},'✕')
        )
      )
    ),
    h('button',{className:'btn btn-ghost btn-sm',style:{marginBottom:12},onClick:addTee},'+ Add Tee'),
    errors.tees&&h('div',{style:{color:'var(--red)',fontSize:12,marginBottom:8}},errors.tees),

    // Hole builder
    h('div',{className:'section-title'},'Scorecard'),
    errors.hcp&&h('div',{style:{color:'var(--red)',fontSize:12,marginBottom:8}},errors.hcp),
    h('div',{style:{overflowX:'auto'}},
      h('table',{style:{width:'100%',borderCollapse:'collapse',minWidth:520}},
        h('thead',null,
          h('tr',null,
            h('th',{style:{textAlign:'left',padding:'4px 6px',fontSize:11,color:'var(--text3)',fontFamily:"'DM Mono',monospace"}},'Hole'),
            ...Array.from({length:18},(_,i)=>h('th',{key:i,style:{padding:'2px',fontSize:11,color:'var(--text3)'}},i+1))
          )
        ),
        h('tbody',null,
          // Par row
          h('tr',null,
            h('td',{style:{padding:'4px 6px',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}},'Par'),
            ...Array.from({length:18},(_,i)=>
              h('td',{key:i,style:{padding:'2px',textAlign:'center'}},
                h('div',{style:{display:'flex',flexDirection:'column',gap:2}},
                  [3,4,5].map(p=>
                    h('button',{key:p,
                      className:`hole-par-btn${draftCourse.par[i]===p?' selected':''}`,
                      style:{width:32,height:28,fontSize:13},
                      onClick:()=>updateDraftHole('par',i,p)},p)
                  )
                )
              )
            )
          ),
          // HCP row
          h('tr',null,
            h('td',{style:{padding:'4px 6px',fontSize:12,fontWeight:600}},'HCP'),
            ...Array.from({length:18},(_,i)=>
              h('td',{key:i,style:{padding:'2px',textAlign:'center'}},
                h('input',{
                  className:'input hcp-input',style:{width:36,padding:'4px 2px',fontSize:12,textAlign:'center'},
                  type:'number',min:1,max:18,value:draftCourse.hcp[i]||'',
                  onChange:e=>updateDraftHole('hcp',i,e.target.value)
                })
              )
            )
          )
        )
      )
    ),

    h('div',{style:{display:'flex',gap:8,marginTop:14}},
      h('button',{className:'btn btn-primary',onClick:saveDraft},'Save Course'),
      h('button',{className:'btn btn-ghost',onClick:()=>setView('list')},'Cancel')
    )
  );
}

// ─── BOOT ────────────────────────────────────────────────────────
document.getElementById('loading').style.display='none';
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App,null));
